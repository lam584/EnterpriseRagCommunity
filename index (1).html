<html>
<head>
    <title>个人简历</title>
    <style>
        body {
            font-family: 'SimSun', serif;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            border: 1px solid black;
            padding: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        td, th {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        .photo {
            width: 100px;
            height: 150px;
            border: 1px solid black;
            margin: 0 auto;
        }
        .photo-cell {
            width: 20%;
        }
        .info-cell {
            width: 5px;
            height: 60px;
        }
        .info-cell1 {
            width: 75px;
            height: 60px;
        }
        .info-cell2 {
            width: 140px;
            height: 60px;
        }
        .info-cell3 {
            width: 250px;
            height: 60px;
        }
        .full-width {
            width: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">个人简历</div>
        <table>
            <tr>
                <td class="photo-cell" rowspan="5">
                    <div class="photo">相片</div>
                </td>
                <td class="info-cell">姓 名</td>
                <td class="info-cell1"></td>
                <td class="info-cell">性 别</td>
                <td class="info-cell1"></td>
                <td class="info-cell">政治面貌</td>
                <td class="info-cell1"></td>
            </tr>
            <tr>
                <td class="info-cell">民 族</td>
                <td class="info-cell1"></td>
                <td class="info-cell">年 龄</td>
                <td class="info-cell1"></td>
                <td class="info-cell">婚 姻</td>
                <td class="info-cell1"></td>
            </tr>
            <tr>
                <td class="info-cell">健康状况</td>
                <td class="info-cell1"></td>
                <td class="info-cell">身 高</td>
                <td class="info-cell1"></td>
                <td class="info-cell">体 重</td>
                <td class="info-cell1"></td>
            </tr>
        </table>
        <table>
            <tr>
                <td class="info-cell">籍 贯</td>
                <td class="info-cell2"></td>
                <td class="info-cell">现所在地</td>
                <td class="info-cell2"></td>
            </tr>
            <tr>
                <td class="info-cell">邮 件</td>
                <td class="info-cell2"></td>
                <td class="info-cell">联系电话</td>
                <td class="info-cell2"></td>
            </tr>
            <tr>
            <td class="info-cell">身份证号码</td>
            <td class="info-cell1"></td>
            </tr>
        </table>
        <table>
            <tr>
                <td class="full-width">求职意向</td>
                <td class="info-cell3"></td>
            </tr>
        </table>
    </div>
</body>
</html>
