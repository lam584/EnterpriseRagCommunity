spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${TEST_DB_JDBC_URL:jdbc:mysql://localhost:3306/EnterpriseRagCommunity_test?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${TEST_DB_USERNAME:root}
spring.datasource.password=${TEST_DB_PASSWORD:password}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=false
spring.config.import=optional:classpath:test-secrets.properties
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:test-system-config.sql

app.es.init.enabled=false
app.scheduling.enabled=false

APP_MASTER_KEY=test-master-key
logging.level.sun.net.www.protocol.http.HttpURLConnection=OFF
logging.level.sun.net.www.protocol.http=OFF
