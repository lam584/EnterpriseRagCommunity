spring.application.name=EnterpriseRagCommunity
debug=${SPRING_DEBUG:false}
spring.mandatory-file-encoding=UTF-8
spring.output.ansi.enabled=always
spring.threads.virtual.enabled=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/EnterpriseRagCommunity?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password

spring.flyway.enabled=true
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.out-of-order=false
spring.flyway.fail-on-missing-locations=false

spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
spring.freemarker.expose-request-attributes=true
spring.freemarker.expose-session-attributes=true
spring.freemarker.expose-spring-macro-helpers=true
spring.freemarker.settings.incompatible_improvements=2.3.34

server.port=8099
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.level.root=${LOG_LEVEL_ROOT:INFO} 
# logging.level.root是全局日志级别，默认是INFO
logging.level.com.example.EnterpriseRagCommunity=INFO
# logging.level.com.example.EnterpriseRagCommunity是应用级日志级别，默认是INFO
logging.level.com.example.EnterpriseRagCommunity.service.ViteManifestService=${LOG_LEVEL_VITE_MANIFEST:INFO}
# logging.level.com.example.EnterpriseRagCommunity.service.ViteManifestService是ViteManifestService的日志级别，默认是INFO
logging.level.org.springframework.web=${LOG_LEVEL_SPRING_WEB:INFO}
# logging.level.org.springframework.web是Spring Web的日志级别，默认是INFO
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=${LOG_LEVEL_SPRING_STATIC:INFO}
# logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler是静态资源的日志级别，默认是INFO

app.tenant.default-code=DEFAULT
app.tenant.default-name=????

app.upload.root=uploads
app.upload.url-prefix=/uploads

app.ai.tokenizer.api-key=${APP_AI_TOKENIZER_API_KEY:}

app.ai.connect-timeout-ms=10000
app.ai.read-timeout-ms=300000
app.ai.default-history-limit=20

app.opensearch.platform.host=${APP_OPENSEARCH_PLATFORM_HOST:http://default-cqn2.platform-cn-shenzhen.opensearch.aliyuncs.com}
app.opensearch.platform.api-key=${APP_OPENSEARCH_PLATFORM_API_KEY:}
app.opensearch.platform.workspace-name=${APP_OPENSEARCH_PLATFORM_WORKSPACE:default}
app.opensearch.platform.service-id=${APP_OPENSEARCH_PLATFORM_SERVICE_ID:ops-qwen-turbo}
app.opensearch.platform.connect-timeout-ms=${APP_OPENSEARCH_PLATFORM_CONNECT_TIMEOUT_MS:10000}
app.opensearch.platform.read-timeout-ms=${APP_OPENSEARCH_PLATFORM_READ_TIMEOUT_MS:10000}

spring.elasticsearch.uris=http://127.0.0.1:9200

# Elasticsearch ApiKey (recommended for ES 8+/9+). Used by both Spring Data Elasticsearch client and manual kNN HTTP call.
app.es.api-key=${APP_ES_API_KEY:}

# Optional timeouts
spring.elasticsearch.connection-timeout=2s
spring.elasticsearch.socket-timeout=10s

# app.retrieval.rag.es.index=rag_post_chunks_v1
# app.retrieval.rag.es.ik-enabled=true
# app.retrieval.rag.es.embedding-dims=1024

app.security.totp.master-key=${APP_TOTP_MASTER_KEY:}

app.mail.username=${APP_MAIL_USERNAME:}
app.mail.password=${APP_MAIL_PASSWORD:}
app.mail.from-address=${APP_MAIL_FROM:}
app.mail.from-name=${APP_MAIL_FROM_NAME:}
