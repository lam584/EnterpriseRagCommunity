spring.application.name=EnterpriseRagCommunity
debug=${SPRING_DEBUG:false}
spring.mandatory-file-encoding=UTF-8
spring.output.ansi.enabled=always
spring.threads.virtual.enabled=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/EnterpriseRagCommunity?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:3000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

spring.flyway.enabled=true
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.out-of-order=false
spring.flyway.fail-on-missing-locations=false
spring.flyway.encoding=UTF-8


server.port=8099
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.servlet.multipart.max-file-size=500GB
spring.servlet.multipart.max-request-size=2TB
server.tomcat.max-http-form-post-size=2TB
server.tomcat.max-swallow-size=2TB

logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.file.name=${LOG_FILE:logs/EnterpriseRagCommunity.log}
logging.logback.rollingpolicy.max-file-size=${LOG_MAX_FILE_SIZE:50MB}
logging.logback.rollingpolicy.max-history=${LOG_MAX_HISTORY:30}
logging.logback.rollingpolicy.total-size-cap=${LOG_TOTAL_SIZE_CAP:5GB}

# 日志级别配置
logging.level.root=${LOG_LEVEL_ROOT:DEBUG}
logging.level.com.example.EnterpriseRagCommunity=INFO
logging.level.com.example.EnterpriseRagCommunity.service.ViteManifestService=${LOG_LEVEL_VITE_MANIFEST:WARN}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING_WEB:WARN}
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=${LOG_LEVEL_SPRING_STATIC:WARN}

logging.level.sun.net.www.protocol.http.HttpURLConnection=OFF
logging.level.sun.net.www.protocol.http=OFF

app.tenant.default-code=DEFAULT
app.tenant.default-name=默认租户

app.logging.access.capture-body=true
app.logging.access.capture-response-body=true
app.logging.access.max-body-bytes=65536

app.security.scan-block.enabled=true
app.security.scan-block.patterns=/.env,/.git/,phpinfo.php,/info.php,/wp-admin,/wp-login,/vendor/,/api/keys,/api/apikey,/api/v1/stripe/config.js,/api/v2/payment/keys.js,/api/webhook.js
app.security.rate-limit.enabled=true
app.security.rate-limit.window-seconds=60
app.security.rate-limit.max-requests-per-window=120
app.security.rate-limit.sensitive-max-requests-per-window=20
app.security.rate-limit.setup-max-requests-per-window=30
app.security.rate-limit.initial-admin-max-requests-per-window=5
app.security.rate-limit.sensitive-path-prefixes=/api/auth,/api/.env,/api/.git,/api/phpinfo.php,/api/info.php,/api/keys,/api/apikey
app.security.rate-limit.cleanup-interval-seconds=120
app.security.client-ip.trust-forward-headers=false
app.security.client-ip.trusted-proxies=

app.upload.root=uploads
app.upload.url-prefix=/uploads

# Dynamic Configuration Keys (Loaded from DB if available, else from Env/Default)
APP_MASTER_KEY=

app.opensearch.platform.host=${APP_OPENSEARCH_PLATFORM_HOST:http://default-cqn2.platform-cn-shenzhen.opensearch.aliyuncs.com}
app.opensearch.platform.workspace-name=${APP_OPENSEARCH_PLATFORM_WORKSPACE:default}
app.opensearch.platform.service-id=${APP_OPENSEARCH_PLATFORM_SERVICE_ID:ops-qwen-turbo}
app.opensearch.platform.connect-timeout-ms=${APP_OPENSEARCH_PLATFORM_CONNECT_TIMEOUT_MS:10000}
app.opensearch.platform.read-timeout-ms=${APP_OPENSEARCH_PLATFORM_READ_TIMEOUT_MS:10000}

# spring.elasticsearch.uris=${spring.elasticsearch.uris:http://127.0.0.1:9200}
spring.elasticsearch.connection-timeout=2s
spring.elasticsearch.socket-timeout=10s
spring.elasticsearch.username=${SPRING_ELASTICSEARCH_USERNAME:}
spring.elasticsearch.password=${SPRING_ELASTICSEARCH_PASSWORD:}
spring.jpa.open-in-view=false
