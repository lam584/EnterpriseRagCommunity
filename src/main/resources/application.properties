spring.application.name=EnterpriseRagCommunity
spring.datasource.url=jdbc:mysql://localhost:3306/EnterpriseRagCommunity?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
logging.level.com.example.EnterpriseRagCommunity.service.ViteManifestService=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=TRACE
server.servlet.context-path=/
spring.freemarker.expose-request-attributes=true
spring.freemarker.expose-session-attributes=true
spring.freemarker.expose-spring-macro-helpers=true
debug=true
logging.level.root=DEBUG
spring.freemarker.settings.incompatible_improvements=2.3.34
logging.level.com.example.EnterpriseRagCommunity=INFO

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.port=8099

spring.output.ansi.enabled=always


logging.charset.console=UTF-8
logging.charset.file=UTF-8


spring.mandatory-file-encoding=UTF-8
# Default tenant used during /api/auth/register-initial-admin (auto-created if missing)
app.tenant.default-code=DEFAULT
app.tenant.default-name=????

# Uploads
app.upload.root=uploads
app.upload.url-prefix=/uploads

# Multipart limits (adjust as needed)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# AI (DashScope OpenAI compatible)
# Base URL (CN-Beijing): https://dashscope.aliyuncs.com/compatible-mode/v1
app.ai.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
# Suggest injecting by env var in production, e.g. set APP_AI_API_KEY=sk-xxx
# setx APP_AI_API_KEY "sk-xxx"
app.ai.api-key=${APP_AI_API_KEY:}
app.ai.model=qwen3-235b-a22b-instruct-2507
app.ai.connect-timeout-ms=10000
app.ai.read-timeout-ms=300000
app.ai.default-history-limit=20
