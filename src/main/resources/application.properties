spring.application.name=NewsHubCommunity
spring.datasource.url=jdbc:mysql://localhost:3306/test12345678?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
# spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
logging.level.com.example.NewsHubCommunity.service.ViteManifestService=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=TRACE
#spring.mvc.view.prefix=/WEB-   INF/jsp/
#spring.mvc.view.suffix=.jsp
server.servlet.context-path=/
spring.freemarker.expose-request-attributes=true
spring.freemarker.expose-session-attributes=true
spring.freemarker.expose-spring-macro-helpers=true
debug=true
logging.level.root=DEBUG
spring.freemarker.settings.incompatible_improvements=2.3.34
# ?application.properties?  logging.level.root=INFO
logging.level.com.example.NewsHubCommunity=INFO

# ??????
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.port=8080
# ?????????
spring.output.ansi.enabled=always

# ????????
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# ??JVM?????
spring.mandatory-file-encoding=UTF-8
