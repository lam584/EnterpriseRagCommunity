management.server.address=127.0.0.1
management.server.port=8098
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Performance profile overrides for stress testing
app.security.rate-limit.enabled=false
app.logging.access.capture-body=false
app.logging.access.capture-response-body=false
app.logging.access.max-body-bytes=4096
app.logging.access.sample-rate=0.10
app.logging.access.keep-error=true
app.logging.access.async-enabled=true
app.logging.access.async-batch-size=500
app.logging.access.async-flush-interval-ms=100
app.logging.access.async-queue-capacity=120000
app.logging.access.async-drop-when-full=true

# Keep protection components but avoid log amplification during pressure runs
logging.level.root=WARN
logging.level.com.example.EnterpriseRagCommunity=INFO

# Increase web and DB concurrency ceilings for higher load targets
server.tomcat.threads.max=800
server.tomcat.threads.min-spare=100
server.tomcat.accept-count=1000
server.tomcat.max-connections=20000
spring.datasource.hikari.maximum-pool-size=120
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
