management.server.address=127.0.0.1
management.server.port=8098
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Performance profile overrides for stress testing
app.security.rate-limit.enabled=false
app.logging.access.capture-body=false
app.logging.access.capture-response-body=false
app.logging.access.max-body-bytes=4096
app.logging.access.sample-rate=0.10
app.logging.access.keep-error=true
app.logging.access.async-enabled=true
app.logging.access.async-batch-size=500
app.logging.access.async-flush-interval-ms=100
app.logging.access.async-queue-capacity=120000
app.logging.access.async-drop-when-full=true
app.logging.access.sink-mode=KAFKA
app.logging.access.kafka-topic=access-logs-v1
app.logging.access.kafka-key-prefix=access
app.logging.access.kafka-send-timeout-ms=3000
app.logging.access.no-drop-guarantee=false

app.logging.access.kafka.producer.enabled=true
app.logging.access.kafka.producer.acks=all
app.logging.access.kafka.producer.idempotence=true
app.logging.access.kafka.producer.retries=20
app.logging.access.kafka.producer.max-in-flight=5
app.logging.access.kafka.producer.delivery-timeout-ms=120000
app.logging.access.kafka.producer.request-timeout-ms=30000
app.logging.access.kafka.producer.linger-ms=3
app.logging.access.kafka.producer.compression-type=lz4

APP_KAFKA_AUTH_ENABLED=false
APP_KAFKA_SECURITY_PROTOCOL=SASL_SSL
APP_KAFKA_SASL_MECHANISM=PLAIN
APP_KAFKA_API_KEY=
APP_KAFKA_API_SECRET=

app.logging.access.es-sink.enabled=true
app.logging.access.es-sink.consumer-enabled=false
app.logging.access.es-sink.consumer-group=access-log-es-sink-v1
app.logging.access.es-sink.index=access-logs-v1
app.logging.access.es-sink.template-name=access-logs-template-v1
app.logging.access.es-sink.index-pattern=access-logs-v1*
app.logging.access.es-sink.auto-init-template=true
app.logging.access.es-sink.template-shards=1
app.logging.access.es-sink.template-replicas=1
app.logging.access.es-sink.dual-verify-enabled=false
app.logging.access.es-sink.dual-verify-log-on-success=false

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=manual_immediate

# Keep protection components but avoid log amplification during pressure runs
logging.level.root=WARN
logging.level.com.example.EnterpriseRagCommunity=INFO

# Increase web and DB concurrency ceilings for higher load targets
server.tomcat.threads.max=800
server.tomcat.threads.min-spare=100
server.tomcat.accept-count=1000
server.tomcat.max-connections=20000
spring.datasource.hikari.maximum-pool-size=120
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
