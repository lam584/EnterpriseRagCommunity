import org.gradle.internal.os.OperatingSystem
import groovy.xml.XmlSlurper

buildscript {
    repositories {
        mavenCentral()
        maven { url = uri('https://maven.aliyun.com/repository/public/') }
    }
    dependencies {
        classpath 'com.mysql:mysql-connector-j:9.4.0'
        classpath 'org.flywaydb:flyway-mysql:12.0.2'
    }
}
plugins {
    id 'java'
    id 'war'
    id 'jacoco'
    id 'org.owasp.dependencycheck' version '12.2.0'
    id 'org.sonarqube' version '7.2.2.6593'
    id 'org.springframework.boot' version '3.5.11'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'org.flywaydb.flyway' version '12.0.2'
}

defaultTasks 'test', 'jacocoTestReport'

bootWar {
    archiveFileName = 'EnterpriseRagCommunity.war'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

ext['elasticsearch-client.version'] = '8.19.9'
ext['log4j2.version'] = '2.25.3'

java {
    toolchain {
        def toolchainVersion = providers.gradleProperty('javaToolchainVersion')
                .orElse('21')
                .map { Integer.parseInt(it) }
                .get()
        languageVersion = JavaLanguageVersion.of(toolchainVersion)
    }
}

def projectJavaLauncher = javaToolchains.launcherFor {
    def toolchainVersion = providers.gradleProperty('javaToolchainVersion')
            .orElse('21')
            .map { Integer.parseInt(it) }
            .get()
    languageVersion = JavaLanguageVersion.of(toolchainVersion)
}

tasks.withType(Test).configureEach {
    javaLauncher = projectJavaLauncher
    maxHeapSize = '4g'
    maxParallelForks = 1
    forkEvery = 100
    jvmArgs(
            '-XX:MaxMetaspaceSize=512m',
            '--enable-native-access=ALL-UNNAMED'
    )
    systemProperty 'spring.test.context.cache.maxSize', '1'
    binaryResultsDirectory.set(layout.buildDirectory.dir("test-results/${name}/binary-${System.currentTimeMillis()}"))
}

tasks.withType(JavaExec).configureEach {
    javaLauncher = projectJavaLauncher
}

tasks.withType(JavaCompile).configureEach {
    def releaseVersion = providers.gradleProperty('javaReleaseVersion')
            .orElse('21')
            .map { Integer.parseInt(it) }
            .get()
    options.release.set(releaseVersion)
    options.compilerArgs.addAll(['-parameters'])
}

repositories {
    mavenCentral()
    // 使用阿里云Maven仓库镜像
    maven { url = uri('https://maven.aliyun.com/repository/public/') }
    maven { url = uri('https://maven.aliyun.com/repository/spring/') }
    maven { url = uri('https://maven.aliyun.com/repository/gradle-plugin/') }
    // 备用仓库
    mavenCentral()
}
bootWar { enabled = true }
bootJar { enabled = false }                // jar 禁用
tasks.named('bootRun') {
    dependsOn 'build'
    classpath = sourceSets.main.runtimeClasspath
    jvmArgs(
            '-Dfile.encoding=UTF-8',
            '-Dsun.stdout.encoding=UTF-8',
            '-Dsun.stderr.encoding=UTF-8',
            '--enable-native-access=ALL-UNNAMED'
    )
}
dependencies {
    // 核心 Web + 内嵌 Tomcat
    implementation 'org.springframework.boot:spring-boot-starter-web:3.5.11'
    implementation 'org.springframework.boot:spring-boot-starter-validation:3.5.11'
    implementation 'org.springframework.boot:spring-boot-starter-mail:3.5.11'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa:3.5.11'
    implementation 'org.springframework.boot:spring-boot-starter-security:3.5.11'
    implementation 'org.springframework.security:spring-security-taglibs:6.5.8'
    implementation 'org.springframework.boot:spring-boot-starter-actuator:3.5.11'
    implementation 'io.micrometer:micrometer-registry-prometheus'
    runtimeOnly 'org.apache.tomcat.embed:tomcat-embed-jasper:10.1.48'              // JSP 引擎
    runtimeOnly 'org.apache.tomcat.embed:tomcat-embed-el:10.1.48'                 // EL 引擎
    runtimeOnly 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:3.0.2'
    runtimeOnly 'org.glassfish.web:jakarta.servlet.jsp.jstl:3.0.1'
    implementation 'org.flywaydb:flyway-mysql:12.0.2'
    implementation 'org.flywaydb:flyway-core:12.0.2'
    runtimeOnly 'com.mysql:mysql-connector-j:9.4.0'
    developmentOnly 'org.springframework.boot:spring-boot-devtools:3.5.11'
    compileOnly 'org.projectlombok:lombok:1.18.42'
    annotationProcessor 'org.projectlombok:lombok:1.18.42'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.5.11'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.mockito:mockito-core:5.2.0'
    testImplementation platform('org.testcontainers:testcontainers-bom:1.20.4')
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.testcontainers:mysql'
    testImplementation 'org.testcontainers:jdbc'
    compileOnly 'io.swagger:swagger-annotations:1.6.14'
    implementation 'org.springframework.boot:spring-boot-starter-data-elasticsearch:3.5.11'
    implementation 'org.apache.poi:poi-ooxml:5.5.1'
    implementation 'org.apache.poi:poi-scratchpad:5.5.1'
    implementation 'org.apache.pdfbox:pdfbox:3.0.2'
    implementation 'org.apache.commons:commons-compress:1.26.2'
    implementation 'org.apache.commons:commons-lang3:3.18.0'
    implementation 'org.apache.tika:tika-core:3.2.2'
    implementation 'org.apache.tika:tika-parsers-standard-package:3.2.2'
}

tasks.named('test') {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed", "standardOut", "standardError"
        showStandardStreams = true
    }
}

def focusTestSource = providers.gradleProperty('focusTestSource')
        .map { it == null ? '' : it.trim() }
        .orElse('')
        .get()

def focusTestSourceLooksLikePath = !focusTestSource.isEmpty() && (focusTestSource.contains('/') || focusTestSource.contains('\\') || focusTestSource.endsWith('.java'))

def focusTestClass = providers.gradleProperty('focusTestClass')
        .map { it == null ? '' : it.trim() }
        .orElse('')
        .get()

def extraFocusTestClass = providers.gradleProperty('extraFocusTestClass')
        .map { it == null ? '' : it.trim() }
        .orElse('')
        .get()

def focusTestEnabled = providers.gradleProperty('focusTestEnabled')
        .map { Boolean.parseBoolean(it == null ? 'false' : it.trim()) }
        .orElse(false)
        .get()

tasks.named('test', Test) {
    filter {
        def patterns = new java.util.ArrayList()
        if (focusTestEnabled) {
            if (!focusTestSource.isEmpty() && !focusTestSourceLooksLikePath) patterns.add("*" + focusTestSource + "*");
            if (!focusTestClass.isEmpty()) patterns.add(focusTestClass);
            if (!extraFocusTestClass.isEmpty()) patterns.add(extraFocusTestClass);
            if (!patterns.isEmpty()) setIncludePatterns(patterns.toArray(new String[0]))
        }
    }
}

tasks.named('compileTestJava', JavaCompile) {
    if (focusTestEnabled) {
        def includes = new java.util.ArrayList()
        includes.add('com/example/EnterpriseRagCommunity/testsupport/**/*.java')
        includes.add('com/example/EnterpriseRagCommunity/testutil/**/*.java')
        if (focusTestSourceLooksLikePath) {
            String p = focusTestSource.replace('\\', '/')
            if (p.startsWith('src/test/java/')) p = p.substring('src/test/java/'.length())
            if (!p.endsWith('.java')) p = p + '.java'
            includes.add(p)
        }
        if (!focusTestClass.isEmpty()) includes.add(focusTestClass.replace('.', '/') + '.java')
        if (!extraFocusTestClass.isEmpty()) includes.add(extraFocusTestClass.replace('.', '/') + '.java')
        if (!includes.isEmpty()) {
            source = sourceSets.test.java.matching { include includes }
        }
    }
}

sourceSets {
    integrationTest {
        java.srcDir file('src/integrationTest/java')
        resources.srcDir file('src/integrationTest/resources')
        resources.srcDir file('src/test/resources')
        compileClasspath += sourceSets.main.output + sourceSets.test.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

tasks.register('integrationTest', Test) {
    group = 'verification'
    description = 'Runs integration tests.'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()
    shouldRunAfter tasks.named('test')
}

tasks.named('check') {
    dependsOn tasks.named('integrationTest')
}

jacoco {
    toolVersion = '0.8.13'
}

tasks.named('test', Test) {
    finalizedBy tasks.named('jacocoTestReport')
    jacoco {
        destinationFile = layout.buildDirectory.file('jacoco/test.exec').get().asFile
    }
}

tasks.withType(Test).configureEach { t ->
    jacoco {
        enabled = true
        destinationFile = layout.buildDirectory.file("jacoco/${t.name}.exec").get().asFile
        excludes = [
                'java/**',
                'javax/**',
                'jdk/**',
                'sun/**',
                'com/sun/**'
        ]
        includeNoLocationClasses = false
    }
}

tasks.named('jacocoTestReport', JacocoReport) {
    dependsOn tasks.named('test')
    executionData(layout.buildDirectory.file('jacoco/test.exec'))
    sourceDirectories.from(sourceSets.main.allSource.srcDirs)
    classDirectories.from(sourceSets.main.output)
    reports {
        xml.required = true
        html.required = true
        csv.required = false
        xml.outputLocation = layout.buildDirectory.file('reports/jacoco/test/jacocoTestReport.xml')
        html.outputLocation = layout.buildDirectory.dir('reports/jacoco/test/html')
    }
}

