    implementation 'org.springframework.boot:spring-boot-starter-web:3.5.11'
    implementation 'org.springframework.boot:spring-boot-starter-validation:3.5.11'
    implementation 'org.springframework.boot:spring-boot-starter-mail:3.5.11'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa:3.5.11'
    implementation 'org.springframework.boot:spring-boot-starter-security:3.5.11'
    implementation 'org.springframework.security:spring-security-taglibs:6.5.8'
    implementation 'org.springframework.boot:spring-boot-starter-actuator:3.5.11'
    implementation 'io.micrometer:micrometer-registry-prometheus'
    runtimeOnly 'org.apache.tomcat.embed:tomcat-embed-jasper:10.1.48'              // JSP 引擎
    runtimeOnly 'org.apache.tomcat.embed:tomcat-embed-el:10.1.48'                 // EL 引擎
    runtimeOnly 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:3.0.2'
    runtimeOnly 'org.glassfish.web:jakarta.servlet.jsp.jstl:3.0.1'
