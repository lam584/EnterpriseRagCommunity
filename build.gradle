tasks.register('serviceAccessCoverageVerify') {
    group = 'verification'
    description = 'Runs service.access focused tests and verifies branch coverage reaches at least 95%.'
    dependsOn tasks.named('jacocoServiceAccessReport')
    doLast {
        def reportPath = layout.buildDirectory.file('reports/jacoco/serviceAccess/jacocoServiceAccessReport.xml').get().asFile
        if (!reportPath.exists()) {
            throw new GradleException("Coverage report not found: ${reportPath}")
        }
        def xmlText = reportPath.getText('UTF-8').replaceFirst(/<!DOCTYPE[^>]*>/, '')
        def report = new XmlSlurper().parseText(xmlText)
        def pkg = report.package.find { it.@name.text() == 'com/example/EnterpriseRagCommunity/service/access' }
        if (!pkg) {
            throw new GradleException('Target package missing in coverage report: com/example/EnterpriseRagCommunity/service/access')
        }
        def branch = pkg.counter.find { it.@type.text() == 'BRANCH' }
        if (!branch) {
            throw new GradleException('Coverage report missing BRANCH counter')
        }
        int covered = branch.@covered.text().toInteger()
        int missed = branch.@missed.text().toInteger()
        int total = covered + missed
        if (total <= 0) {
            throw new GradleException('Coverage denominator is 0, cannot verify')
        }
        BigDecimal branchPct = ((covered * 100.0) / total).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)

        def classRows = pkg.class.collect { cls ->
            def b = cls.counter.find { it.@type.text() == 'BRANCH' }
            if (!b) return null
            int c = b.@covered.text().toInteger()
            int m = b.@missed.text().toInteger()
            int t = c + m
            if (t <= 0 || m <= 0) return null
            BigDecimal p = ((c * 100.0) / t).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)
            [name: cls.@name.text().tokenize('/').last(), pct: p, covered: c, missed: m, total: t]
        }.findAll { it != null }.sort { a, b ->
            (b.missed <=> a.missed) ?: (a.pct <=> b.pct) ?: (b.total <=> a.total)
        }

        def summaryPath = layout.buildDirectory.file('reports/jacoco/serviceAccess/summary.txt').get().asFile
        summaryPath.parentFile.mkdirs()
        summaryPath.text = buildString {
            append("service.access Branches: ${branchPct}% (${covered}/${total})\n")
            append("TopGapClasses:\n")
            classRows.take(10).eachWithIndex { row, i ->
                append("${i + 1}. ${row.name} pct=${row.pct}% missed=${row.missed} covered=${row.covered} total=${row.total}\n")
            }
        }

        println "service.access Branches: ${branchPct}% (${covered}/${total})"
        if (branchPct < 95.00) {
            throw new GradleException("service.access branch coverage is below 95%: ${branchPct}%")
        }
    }
}

