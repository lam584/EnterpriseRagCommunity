    )
    sourceDirectories.setFrom(files('src/main/java'))
    reports {
        xml.required = true
        html.required = true
        xml.outputLocation = layout.buildDirectory.file('reports/jacoco/adminContentController/jacocoAdminContentControllerReport.xml')
        html.outputLocation = layout.buildDirectory.dir('reports/jacoco/adminContentController/html')
    }
}

tasks.register('verifyAdminContentControllerBranchCoverage95') {
    group = 'verification'
    dependsOn tasks.named('jacocoAdminContentControllerReport')
    doLast {
        def report = layout.buildDirectory.file('reports/jacoco/adminContentController/html/com.example.EnterpriseRagCommunity.controller.content.admin/index.html').get().asFile
        if (!report.exists()) {
            throw new GradleException("JaCoCo HTML report not found: ${report}")
        }
        def text = report.getText('UTF-8')
        def m = (text =~ /<tfoot><tr><td>Total<\/td><td class="bar">[^<]+<\/td><td class="ctr2">[^<]+<\/td><td class="bar">([0-9,]+) of ([0-9,]+)<\/td><td class="ctr2">[^<]+<\/td>/)
        if (!m.find()) {
            throw new GradleException('Branch total row not found in JaCoCo HTML report')
        }
        long missed = (m.group(1) ?: '0').replace(',', '') as long
        long total = (m.group(2) ?: '0').replace(',', '') as long
        long covered = total - missed
        BigDecimal ratio = total == 0L ? 0G : (covered * 100G / total)
        if (ratio < 95G) {
            throw new GradleException("admin content controller package branch coverage below 95%: ${ratio.setScale(2, java.math.RoundingMode.HALF_UP)}% (${covered}/${total})")
        }
        println "admin content controller package branch coverage: ${ratio.setScale(2, java.math.RoundingMode.HALF_UP)}% (${covered}/${total})"
    }
}

dependencyCheck {
    formats = ['HTML', 'JSON']
    outputDirectory = layout.buildDirectory.dir('reports/dependency-check').get().asFile.absolutePath
    failBuildOnCVSS = 9.0
    def nvdApiKey = providers.environmentVariable('NVD_API_KEY')
    autoUpdate = nvdApiKey.isPresent()
    analyzers {
        assemblyEnabled = false
    }
    nvd {
        apiKey = nvdApiKey.orNull // 推荐从环境变量读取
        // 或者硬编码（不推荐）：apiKey = '你的_API_KEY'
    }
}

sonar {
    properties {
        property 'sonar.projectKey', 'EnterpriseRagCommunity'
        property 'sonar.projectName', 'EnterpriseRagCommunity'
        property 'sonar.sourceEncoding', 'UTF-8'
    }
}

// Spring Boot 打包配置：关闭 bootJar，启用 bootWar
tasks.named('bootJar') {
    enabled = false
}
tasks.named('bootWar') {
    enabled = true
}

// —— 前端构建（Vite） & 资源拷贝 ——

// 1. 前端构建
// 将 Vite 的 stdout/stderr 捕获并在失败时完整输出，避免只看到非零退出码而没有详细错误
// 同时在 Windows 上优先使用固定路径的 E:\\NodeJS\\npm.cmd，若不存在则回退到系统 PATH 中的 npm(.cmd)

def configureFrontendNpmExec = { Exec task, String scriptName ->
    def isWin = OperatingSystem.current().isWindows()
    def fixedNpm = isWin ? file('E:/NodeJS/npm.cmd') : null
    if (isWin && fixedNpm != null && fixedNpm.exists()) {
        task.commandLine 'cmd', '/c', fixedNpm.absolutePath, 'run', scriptName
    } else if (isWin) {
        task.commandLine 'cmd', '/c', 'npm.cmd', 'run', scriptName
    } else {
        task.commandLine 'bash', '-lc', "npm run ${scriptName}"
    }
}

tasks.register('buildVite', Exec) {
    workingDir 'my-vite-app'

    inputs.dir('my-vite-app/src')
    inputs.dir('my-vite-app/public')
    inputs.files(
            'my-vite-app/package.json',
            'my-vite-app/package-lock.json',
            'my-vite-app/index.html',
            'my-vite-app/vite.config.ts',
            'my-vite-app/tsconfig.json',
            'my-vite-app/tsconfig.app.json',
            'my-vite-app/tsconfig.node.json',
            'my-vite-app/postcss.config.js',
            'my-vite-app/tailwind.config.js',
            'my-vite-app/eslint.config.js',
            'my-vite-app/vitest.config.ts'
    )
    outputs.dir('my-vite-app/dist')

    // 捕获标准输出/错误 - 移除自定义捕获，直接输出到控制台以避免 Native 绑定问题
    // standardOutput = stdoutBuffer
    // errorOutput = stderrBuffer
    // ignoreExitValue = true

    // 选择 npm 命令（通过 shell 启动，确保即使命令不存在也能拿到 9009/127 等错误码与 stderr）
    configureFrontendNpmExec(delegate, 'build')

    /*
    doLast {
        // ... 移除手动日志打印，使用 Gradle 默认行为
    }
    */
}

def frontendCoverageEnabled = providers.gradleProperty('frontendCoverage')
        .map { Boolean.parseBoolean(it) }
        .orElse(false)
        .get()

tasks.register('vitestCoverage', Exec) {
    group = 'verification'
    description = 'Runs Vitest with coverage enabled.'
    workingDir 'my-vite-app'

    inputs.dir('my-vite-app/src')
    inputs.dir('my-vite-app/public')
    inputs.files(
            'my-vite-app/package.json',
            'my-vite-app/package-lock.json',
            'my-vite-app/vitest.config.ts',
            'my-vite-app/vite.config.ts',
            'my-vite-app/tsconfig.json',
            'my-vite-app/tsconfig.app.json',
            'my-vite-app/tsconfig.node.json'
    )
    outputs.file('my-vite-app/test-reports/vitest-junit.xml')
    outputs.dir('my-vite-app/test-reports/vitest-coverage')

    configureFrontendNpmExec(delegate, 'test:ci')
}

tasks.named('check') {
    if (frontendCoverageEnabled) {
        dependsOn tasks.named('vitestCoverage')
    }
}

// 2. 处理资源，把 my-vite-app/dist 下的文件复制到 Spring Boot 的 static 目录
processResources {
    def taskNames = gradle.startParameter.taskNames.collect { it == null ? '' : it.toLowerCase() }
    def skipViteBuild = taskNames.any { n ->
        n.contains('test') || n.contains('jacoco') || n.contains('coverage') || n == 'check'
    }
    if (!skipViteBuild) {
        dependsOn buildVite
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    // 清空旧资源（避免使用已弃用的 buildDir，改用 layout.buildDirectory）
    doFirst {
        delete(layout.buildDirectory.dir("resources/main/static").get().asFile)
    }

    from('my-vite-app/dist') {
        into 'static'
    }
}
