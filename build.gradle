def coverageGateEnabled = providers.gradleProperty('coverageGate')
        .map { Boolean.parseBoolean(it) }
        .orElse(false)
        .get()

def coverageStage = providers.gradleProperty('coverageStage')
        .map { Integer.parseInt(it) }
        .orElse(1)
        .get()

def coverageGateMode = providers.gradleProperty('coverageGateMode')
        .orElse('unit')
        .map { it == null ? 'unit' : it.toLowerCase().trim() }
        .get()

def coverageStageDefaults = coverageStage >= 2
        ? [overallLines: 0.55, overallBranches: 0.40, keyLines: 0.40]
        : [overallLines: 0.40, overallBranches: 0.30, keyLines: 0.25]

def overallLinesMin = providers.gradleProperty('coverage.threshold.overall.lines')
        .orElse(String.valueOf(coverageStageDefaults.overallLines))
        .map { it.toBigDecimal() }
        .get()

def overallBranchesMin = providers.gradleProperty('coverage.threshold.overall.branches')
        .orElse(String.valueOf(coverageStageDefaults.overallBranches))
        .map { it.toBigDecimal() }
        .get()

def keyLinesMin = providers.gradleProperty('coverage.threshold.key.lines')
        .orElse(String.valueOf(coverageStageDefaults.keyLines))
        .map { it.toBigDecimal() }
        .get()

def splitCsvGlobs = { String raw ->
    if (raw == null) {
        return []
    }
    def v = raw.trim()
    if (!v) {
        return []
    }
    return v.split(',')
            .collect { it.trim() }
            .findAll { it }
}

