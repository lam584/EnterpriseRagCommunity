        def cls = xml.package.find { p ->
            p.@name.text() == 'com/example/EnterpriseRagCommunity/service/moderation/admin'
        }?.class?.find { c ->
            c.@name.text() == 'com/example/EnterpriseRagCommunity/service/moderation/admin/AdminModerationLlmContextBuilder'
        }
        if (!cls) {
            throw new GradleException('AdminModerationLlmContextBuilder coverage entry not found')
        }
        def branch = cls.counter.find { it.@type.text() == 'BRANCH' }
        def instruction = cls.counter.find { it.@type.text() == 'INSTRUCTION' }
        def line = cls.counter.find { it.@type.text() == 'LINE' }
        def method = cls.counter.find { it.@type.text() == 'METHOD' }
        if (!branch || !instruction || !line || !method) {
            throw new GradleException('Coverage report missing required counters')
        }
        def counters = [
                [name: 'Branches', counter: branch],
                [name: 'Instructions', counter: instruction],
                [name: 'Lines', counter: line],
