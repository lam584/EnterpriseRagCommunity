        BigDecimal branchPct = ((covered * 100.0) / total).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)
        println "service.monitor Branches: ${branchPct}% (${covered}/${total})"
        if (branchPct < 95.00) {
            throw new GradleException("service.monitor branch coverage is below 95%: ${branchPct}%")
        }
    }
}

