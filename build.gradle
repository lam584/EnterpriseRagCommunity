tasks.named('test') {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed", "standardOut", "standardError"
        showStandardStreams = true
    }
}

def focusTestSource = providers.gradleProperty('focusTestSource')
        .map { it == null ? '' : it.trim() }
        .orElse('')
        .get()

def focusTestSourceLooksLikePath = !focusTestSource.isEmpty() && (focusTestSource.contains('/') || focusTestSource.contains('\\') || focusTestSource.endsWith('.java'))

def focusTestClass = providers.gradleProperty('focusTestClass')
        .map { it == null ? '' : it.trim() }
        .orElse('')
        .get()

def extraFocusTestClass = providers.gradleProperty('extraFocusTestClass')
        .map { it == null ? '' : it.trim() }
        .orElse('')
        .get()

def focusTestEnabled = providers.gradleProperty('focusTestEnabled')
        .map { Boolean.parseBoolean(it == null ? 'false' : it.trim()) }
        .orElse(false)
        .get()

tasks.named('test', Test) {
    filter {
        def patterns = new java.util.ArrayList()
        if (focusTestEnabled) {
            if (!focusTestSource.isEmpty() && !focusTestSourceLooksLikePath) patterns.add("*" + focusTestSource + "*");
            if (!focusTestClass.isEmpty()) patterns.add(focusTestClass);
            if (!extraFocusTestClass.isEmpty()) patterns.add(extraFocusTestClass);
            if (!patterns.isEmpty()) setIncludePatterns(patterns.toArray(new String[0]))
        }
    }
}

tasks.named('compileTestJava', JavaCompile) {
    if (focusTestEnabled) {
        def includes = new java.util.ArrayList()
        includes.add('com/example/EnterpriseRagCommunity/testsupport/**/*.java')
        includes.add('com/example/EnterpriseRagCommunity/testutil/**/*.java')
        if (focusTestSourceLooksLikePath) {
            String p = focusTestSource.replace('\\', '/')
            if (p.startsWith('src/test/java/')) p = p.substring('src/test/java/'.length())
            if (!p.endsWith('.java')) p = p + '.java'
            includes.add(p)
        }
        if (!focusTestClass.isEmpty()) includes.add(focusTestClass.replace('.', '/') + '.java')
        if (!extraFocusTestClass.isEmpty()) includes.add(extraFocusTestClass.replace('.', '/') + '.java')
        if (!includes.isEmpty()) {
            source = sourceSets.test.java.matching { include includes }
        }
    }
}

sourceSets {
    integrationTest {
        java.srcDir file('src/integrationTest/java')
        resources.srcDir file('src/integrationTest/resources')
        resources.srcDir file('src/test/resources')
        compileClasspath += sourceSets.main.output + sourceSets.test.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

tasks.register('integrationTest', Test) {
    group = 'verification'
    description = 'Runs integration tests.'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()
    shouldRunAfter tasks.named('test')
}

tasks.named('check') {
    dependsOn tasks.named('integrationTest')
}

jacoco {
    toolVersion = '0.8.13'
}

tasks.named('test', Test) {
    finalizedBy tasks.named('jacocoTestReport')
    jacoco {
        destinationFile = layout.buildDirectory.file('jacoco/test.exec').get().asFile
    }
}

tasks.withType(Test).configureEach { t ->
    jacoco {
        enabled = true
        destinationFile = layout.buildDirectory.file("jacoco/${t.name}.exec").get().asFile
        excludes = [
                'java/**',
                'javax/**',
                'jdk/**',
                'sun/**',
                'com/sun/**'
        ]
        includeNoLocationClasses = false
    }
}

tasks.named('jacocoTestReport', JacocoReport) {
    dependsOn tasks.named('test')
    executionData(layout.buildDirectory.file('jacoco/test.exec'))
    sourceDirectories.from(sourceSets.main.allSource.srcDirs)
    classDirectories.from(sourceSets.main.output)
    reports {
        xml.required = true
        html.required = true
        csv.required = false
        xml.outputLocation = layout.buildDirectory.file('reports/jacoco/test/jacocoTestReport.xml')
        html.outputLocation = layout.buildDirectory.dir('reports/jacoco/test/html')
    }
}

def registerFocusedCoverageTest = { Map cfg ->
    tasks.register(cfg.testTask, Test) {
        group = 'verification'
        description = cfg.description
        testClassesDirs = sourceSets.test.output.classesDirs
        classpath = sourceSets.test.runtimeClasspath
        useJUnitPlatform()
        if (cfg.containsKey('extensionsAutodetectionEnabled')) {
            systemProperty 'junit.jupiter.extensions.autodetection.enabled', String.valueOf(cfg.extensionsAutodetectionEnabled)
        }
        filter {
            cfg.testPatterns.each { includeTestsMatching it }
        }
        jacoco {
            enabled = true
            destinationFile = layout.buildDirectory.file("jacoco/${cfg.execFile}.exec").get().asFile
        }
        if (cfg.finalizedReportTask) {
            finalizedBy cfg.finalizedReportTask
        }
    }
}

def registerFocusedCoverageReport = { Map cfg ->
    tasks.register(cfg.reportTask, JacocoReport) {
        group = 'verification'
        dependsOn tasks.named(cfg.testTask)
        executionData(layout.buildDirectory.file("jacoco/${cfg.execFile}.exec"))
        if (cfg.onlyIfExecExists) {
            onlyIf {
                layout.buildDirectory.file("jacoco/${cfg.execFile}.exec").get().asFile.exists()
            }
        }
        sourceDirectories.from(sourceSets.main.allSource.srcDirs)
        classDirectories.from(files(sourceSets.main.output.classesDirs).asFileTree.matching {
            include "${cfg.classFileBase}.class"
            include "${cfg.classFileBase}\$*.class"
        })
        reports {
            xml.required = true
            html.required = true
            csv.required = false
            xml.outputLocation = layout.buildDirectory.file("reports/jacoco/${cfg.reportDir}/${cfg.reportTask}.xml")
            html.outputLocation = layout.buildDirectory.dir("reports/jacoco/${cfg.reportDir}/html")
        }
    }
}

def registerExactClassCoverageVerification = { Map cfg ->
    tasks.register(cfg.verifyTask) {
        group = 'verification'
        description = cfg.verifyDescription ?: "Runs ${cfg.displayName} focused tests and verifies 100% coverage."
        dependsOn tasks.named(cfg.reportTask)
        doLast {
            def report = layout.buildDirectory.file("reports/jacoco/${cfg.reportDir}/${cfg.reportTask}.xml").get().asFile
            if (!report.exists()) {
                throw new GradleException("Coverage report not found: ${report}")
            }
            (cfg.requiredFiles ?: []).each { relativePath ->
                def requiredFile = layout.buildDirectory.file(relativePath).get().asFile
                if (!requiredFile.exists()) {
                    throw new GradleException("Required file missing: ${requiredFile}")
                }
            }
            def packageName = cfg.classFileBase.substring(0, cfg.classFileBase.lastIndexOf('/'))
            def xml = new XmlSlurper().parse(report)
            def cls = xml.package.find { p ->
                p.@name.text() == packageName
            }?.class?.find { c ->
                c.@name.text() == cfg.classFileBase
            }
            if (!cls) {
                throw new GradleException("${cfg.displayName} coverage entry not found")
            }
            def branch = cls.counter.find { it.@type.text() == 'BRANCH' }
            def instruction = cls.counter.find { it.@type.text() == 'INSTRUCTION' }
            def line = cls.counter.find { it.@type.text() == 'LINE' }
            def method = cls.counter.find { it.@type.text() == 'METHOD' }
            if (!branch || !instruction || !line || !method) {
                throw new GradleException('Coverage report missing required counters')
            }
            def counters = [
                    [label: 'Branches', counter: branch],
                    [label: 'Instructions', counter: instruction],
                    [label: 'Lines', counter: line],
                    [label: 'Methods', counter: method]
            ]
            counters.each { item ->
                int missed = item.counter.@missed.text().toInteger()
                int covered = item.counter.@covered.text().toInteger()
                int total = missed + covered
                if (cfg.requireNonZeroDenominator && total <= 0) {
                    throw new GradleException("${cfg.displayName} ${item.label} coverage denominator is 0")
                }
                if (missed != 0) {
                    throw new GradleException("${cfg.displayName} ${item.label.toLowerCase()} coverage is below 100%, missed=${missed}")
                }
                if (cfg.printCoveredTotals) {
                    println "${cfg.displayName} ${item.label}: 100% (${covered}/${total})"
                } else {
                    println "${cfg.displayName} ${item.label}: 100%"
                }
            }
            def htmlPackagePath = packageName.replace('/', '.')
            def htmlFileName = cfg.classFileBase.tokenize('/').last() + '.html'
            def classHtml = layout.buildDirectory.file("reports/jacoco/${cfg.reportDir}/html/${htmlPackagePath}/${htmlFileName}").get().asFile
            if (!classHtml.exists()) {
                throw new GradleException("Readable class page missing: ${classHtml}")
            }
        }
    }
}

