tasks.register('verifySafetyServiceBranchCoverage95') {
    group = 'verification'
    dependsOn tasks.named('jacocoSafetyServiceReport')
    doLast {
        def report = layout.buildDirectory.file('reports/jacoco/safetyService/html/com.example.EnterpriseRagCommunity.service.safety/index.html').get().asFile
        if (!report.exists()) {
            throw new GradleException("JaCoCo HTML report not found: ${report}")
        }
        def text = report.getText('UTF-8')
        def m = (text =~ /<tfoot><tr><td>Total<\/td><td class="bar">[^<]+<\/td><td class="ctr2">[^<]+<\/td><td class="bar">([0-9,]+) of ([0-9,]+)<\/td><td class="ctr2">[^<]+<\/td>/)
        if (!m.find()) {
            throw new GradleException('Branch total row not found in JaCoCo HTML report')
        }
        long missed = (m.group(1) ?: '0').replace(',', '') as long
        long total = (m.group(2) ?: '0').replace(',', '') as long
        long covered = total - missed
        BigDecimal ratio = total == 0L ? 0G : (covered * 100G / total)
        if (ratio < 95G) {
            throw new GradleException("safety package branch coverage below 95%: ${ratio.setScale(2, java.math.RoundingMode.HALF_UP)}% (${covered}/${total})")
        }
        println "safety package branch coverage: ${ratio.setScale(2, java.math.RoundingMode.HALF_UP)}% (${covered}/${total})"
    }
}

