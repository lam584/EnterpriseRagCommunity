tasks.register('verifyAdminModerationLlmUpstreamSupportCoverage95') {
    group = 'verification'
    description = 'Runs AdminModerationLlmUpstreamSupport focused tests and verifies branch coverage reaches 95%.'
    dependsOn tasks.named('jacocoAdminModerationLlmUpstreamSupportReport')
    doLast {
        def reportPath = layout.buildDirectory.file('reports/jacoco/adminModerationLlmUpstreamSupport/jacocoAdminModerationLlmUpstreamSupportReport.xml').get().asFile
        if (!reportPath.exists()) {
            throw new GradleException("Coverage report not found: ${reportPath}")
        }
        String xml = reportPath.getText('UTF-8')
        String classMarker = '<class name="com/example/EnterpriseRagCommunity/service/moderation/admin/AdminModerationLlmUpstreamSupport"'
        int classStart = xml.indexOf(classMarker)
        if (classStart < 0) {
            throw new GradleException('AdminModerationLlmUpstreamSupport coverage entry not found')
        }
        int classEnd = xml.indexOf('</class>', classStart)
        if (classEnd < 0) {
            throw new GradleException('AdminModerationLlmUpstreamSupport coverage block is malformed')
        }
        String classBlock = xml.substring(classStart, classEnd)
        def m = (classBlock =~ /<counter type="BRANCH" missed="(\d+)" covered="(\d+)"\/>/)
        if (!m.find()) {
            throw new GradleException('AdminModerationLlmUpstreamSupport coverage report missing BRANCH counter')
        }
        int missed = Integer.parseInt(m.group(1))
        int covered = Integer.parseInt(m.group(2))
        int total = covered + missed
        if (total <= 0) {
            throw new GradleException('AdminModerationLlmUpstreamSupport branch denominator is 0, cannot verify')
        }
        BigDecimal branchPct = ((covered * 100.0) / total).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)
        println "AdminModerationLlmUpstreamSupport Branches: ${branchPct}% (${covered}/${total}), missed=${missed}"
        if (branchPct < 95.00) {
            throw new GradleException("AdminModerationLlmUpstreamSupport branch coverage is below 95%: ${branchPct}%")
        }
    }
}

tasks.register('printAdminModerationLlmUpstreamSupportBranchMisses') {
    group = 'verification'
    description = 'Prints per-method branch miss stats for AdminModerationLlmUpstreamSupport focused report.'
    dependsOn tasks.named('jacocoAdminModerationLlmUpstreamSupportReport')
    doLast {
        def reportPath = layout.buildDirectory.file('reports/jacoco/adminModerationLlmUpstreamSupport/jacocoAdminModerationLlmUpstreamSupportReport.xml').get().asFile
        if (!reportPath.exists()) {
            throw new GradleException("Coverage report not found: ${reportPath}")
        }
        String xml = reportPath.getText('UTF-8')
        String classMarker = '<class name="com/example/EnterpriseRagCommunity/service/moderation/admin/AdminModerationLlmUpstreamSupport"'
        int classStart = xml.indexOf(classMarker)
        int classEnd = xml.indexOf('</class>', classStart)
        if (classStart < 0 || classEnd < 0) {
            throw new GradleException('AdminModerationLlmUpstreamSupport coverage entry not found')
        }
        String classBlock = xml.substring(classStart, classEnd)
        def methodPattern = ~/<method name="([^"]+)" desc="([^"]+)" line="(\d+)">([\s\S]*?)<\/method>/
        def branchPattern = ~/<counter type="BRANCH" missed="(\d+)" covered="(\d+)"\/>/
        List<String> rows = []
        def mm = methodPattern.matcher(classBlock)
        while (mm.find()) {
            String name = mm.group(1)
            String desc = mm.group(2)
            String line = mm.group(3)
            String body = mm.group(4)
            def bm = branchPattern.matcher(body)
            if (!bm.find()) {
                continue
            }
            int missed = Integer.parseInt(bm.group(1))
            int covered = Integer.parseInt(bm.group(2))
            if (missed > 0) {
                int total = missed + covered
                BigDecimal pct = ((covered * 100.0) / total).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)
                rows.add(String.format('%03d miss | %6.2f%% | L%s | %s %s', missed, pct, line, name, desc))
            }
        }
        rows.sort().reverseEach { println it }
    }
}

tasks.register('ragContextPromptServiceCoverageVerify') {
    group = 'verification'
    description = 'Runs RagContextPromptService focused tests and verifies branch coverage reaches 100%.'
    dependsOn tasks.named('jacocoRagContextPromptServiceReport')
    doLast {
        def reportPath = layout.buildDirectory.file('reports/jacoco/ragContextPromptService/jacocoRagContextPromptServiceReport.xml').get().asFile
        if (!reportPath.exists()) {
            throw new GradleException("Coverage report not found: ${reportPath}")
        }
        def report = new XmlSlurper().parse(reportPath)
        def pkg = report.package.find { it.@name.text() == 'com/example/EnterpriseRagCommunity/service/ai' }
        if (!pkg) {
            throw new GradleException('Target package missing in coverage report: com/example/EnterpriseRagCommunity/service/ai')
        }
        def cls = pkg.class.find { it.@name.text() == 'com/example/EnterpriseRagCommunity/service/ai/RagContextPromptService' }
        if (!cls) {
            throw new GradleException('Target class missing in coverage report: RagContextPromptService')
        }
        def branch = cls.counter.find { it.@type.text() == 'BRANCH' }
        def instruction = cls.counter.find { it.@type.text() == 'INSTRUCTION' }
        def line = cls.counter.find { it.@type.text() == 'LINE' }
        def method = cls.counter.find { it.@type.text() == 'METHOD' }
        if (!branch || !instruction || !line || !method) {
            throw new GradleException('Coverage report missing BRANCH/INSTRUCTION/LINE/METHOD counter')
        }

        int branchCovered = branch.@covered.text().toInteger()
        int branchMissed = branch.@missed.text().toInteger()
        int instructionCovered = instruction.@covered.text().toInteger()
        int instructionMissed = instruction.@missed.text().toInteger()
        int lineCovered = line.@covered.text().toInteger()
        int lineMissed = line.@missed.text().toInteger()
        int methodCovered = method.@covered.text().toInteger()
        int methodMissed = method.@missed.text().toInteger()

        int branchTotal = branchCovered + branchMissed
        int instructionTotal = instructionCovered + instructionMissed
        int lineTotal = lineCovered + lineMissed
        int methodTotal = methodCovered + methodMissed
        if (branchTotal <= 0 || instructionTotal <= 0 || lineTotal <= 0 || methodTotal <= 0) {
            throw new GradleException('Coverage denominator is 0, cannot verify')
        }

        BigDecimal branchPct = ((branchCovered * 100.0) / branchTotal).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)
        BigDecimal instructionPct = ((instructionCovered * 100.0) / instructionTotal).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)
        BigDecimal linePct = ((lineCovered * 100.0) / lineTotal).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)
        BigDecimal methodPct = ((methodCovered * 100.0) / methodTotal).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)

        println "RagContextPromptService Branches: ${branchPct}% (${branchCovered}/${branchTotal})"
        println "RagContextPromptService Instructions: ${instructionPct}% (${instructionCovered}/${instructionTotal})"
        println "RagContextPromptService Lines: ${linePct}% (${lineCovered}/${lineTotal})"
        println "RagContextPromptService Methods: ${methodPct}% (${methodCovered}/${methodTotal})"

        def classHtml = layout.buildDirectory.file('reports/jacoco/ragContextPromptService/html/com.example.EnterpriseRagCommunity.service.ai/RagContextPromptService.html').get().asFile
        if (!classHtml.exists()) {
            throw new GradleException("Readable class page missing: ${classHtml}")
        }
        if (branchPct < 100.00) {
            throw new GradleException("RagContextPromptService branch coverage is below 100%: ${branchPct}%")
        }
    }
}

