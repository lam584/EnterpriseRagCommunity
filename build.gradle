tasks.register('adminModerationQueueServiceImplCoverageVerify') {
    group = 'verification'
    description = 'Runs AdminModerationQueueServiceImpl focused tests and verifies branch coverage reaches at least 95%.'
    dependsOn tasks.named('jacocoAdminModerationQueueServiceImplReport')
    doLast {
        def reportPath = layout.buildDirectory.file('reports/jacoco/adminModerationQueueServiceImpl/jacocoAdminModerationQueueServiceImplReport.xml').get().asFile
        if (!reportPath.exists()) {
            throw new GradleException("Coverage report not found: ${reportPath}")
        }
        def xmlText = reportPath.getText('UTF-8').replaceFirst(/<!DOCTYPE[^>]*>/, '')
        def report = new XmlSlurper().parseText(xmlText)
        def pkg = report.package.find { it.@name.text() == 'com/example/EnterpriseRagCommunity/service/moderation/impl' }
        if (!pkg) {
            throw new GradleException('Target package missing in coverage report: com/example/EnterpriseRagCommunity/service/moderation/impl')
        }
        def cls = pkg.class.find { it.@name.text() == 'com/example/EnterpriseRagCommunity/service/moderation/impl/AdminModerationQueueServiceImpl' }
        if (!cls) {
            throw new GradleException('Target class missing in coverage report: AdminModerationQueueServiceImpl')
        }
        def branch = cls.counter.find { it.@type.text() == 'BRANCH' }
        if (!branch) {
            throw new GradleException('Coverage report missing BRANCH counter')
        }
        int covered = branch.@covered.text().toInteger()
        int missed = branch.@missed.text().toInteger()
        int total = covered + missed
        if (total <= 0) {
            throw new GradleException('Coverage denominator is 0, cannot verify')
        }
        BigDecimal branchPct = ((covered * 100.0) / total).toBigDecimal().setScale(2, BigDecimal.ROUND_HALF_UP)
        println "AdminModerationQueueServiceImpl Branches: ${branchPct}% (${covered}/${total})"
        def classHtml = layout.buildDirectory.file('reports/jacoco/adminModerationQueueServiceImpl/html/com.example.EnterpriseRagCommunity.service.moderation.impl/AdminModerationQueueServiceImpl.html').get().asFile
        if (!classHtml.exists()) {
            throw new GradleException("Readable class page missing: ${classHtml}")
        }
        if (branchPct < 95.00) {
            throw new GradleException("AdminModerationQueueServiceImpl branch coverage is below 95%: ${branchPct}%")
        }
    }
}

