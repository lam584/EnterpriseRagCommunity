tasks.register('verifyRagPostChatRetrievalServiceCoverage100') {
    group = 'verification'
    description = 'Runs RagPostChatRetrievalService focused tests and verifies 100% coverage.'
    dependsOn tasks.named('jacocoRagPostChatRetrievalServiceReport')
    doLast {
        def report = layout.buildDirectory.file('reports/jacoco/ragPostChatRetrievalService/jacocoRagPostChatRetrievalServiceReport.xml').get().asFile
        if (!report.exists()) {
            throw new GradleException("Coverage report not found: ${report}")
        }
        def xml = new XmlSlurper().parse(report)
        def cls = xml.package.find { p ->
            p.@name.text() == 'com/example/EnterpriseRagCommunity/service/retrieval'
        }?.class?.find { c ->
            c.@name.text() == 'com/example/EnterpriseRagCommunity/service/retrieval/RagPostChatRetrievalService'
        }
        if (!cls) {
            throw new GradleException('RagPostChatRetrievalService coverage entry not found')
        }
        def branch = cls.counter.find { it.@type.text() == 'BRANCH' }
        def instruction = cls.counter.find { it.@type.text() == 'INSTRUCTION' }
        def line = cls.counter.find { it.@type.text() == 'LINE' }
        def method = cls.counter.find { it.@type.text() == 'METHOD' }
        if (!branch || !instruction || !line || !method) {
            throw new GradleException('Coverage report missing required counters')
        }
        def counters = [branch: branch, instruction: instruction, line: line, method: method]
        counters.each { name, c ->
            int missed = c.@missed.text().toInteger()
            if (missed != 0) {
                throw new GradleException("RagPostChatRetrievalService ${name} coverage is below 100%, missed=${missed}")
            }
        }
        def classHtml = layout.buildDirectory.file('reports/jacoco/ragPostChatRetrievalService/html/com.example.EnterpriseRagCommunity.service.retrieval/RagPostChatRetrievalService.html').get().asFile
        if (!classHtml.exists()) {
            throw new GradleException("Readable class page missing: ${classHtml}")
        }
        println 'RagPostChatRetrievalService Branches: 100%'
        println 'RagPostChatRetrievalService Instructions: 100%'
        println 'RagPostChatRetrievalService Lines: 100%'
        println 'RagPostChatRetrievalService Methods: 100%'
    }
}

