def normalizedCoverageGateMode = (coverageGateMode == 'both' || coverageGateMode == 'unit' || coverageGateMode == 'integration')
        ? coverageGateMode
        : 'unit'

tasks.register('coverageGate') {
    group = 'verification'
    onlyIf { coverageGateEnabled }
    if (normalizedCoverageGateMode == 'unit' || normalizedCoverageGateMode == 'both') {
        dependsOn tasks.named('jacocoUnitCoverageVerificationOverall')
        dependsOn tasks.named('jacocoUnitCoverageVerificationKeyPackages')
    }
    if (normalizedCoverageGateMode == 'integration' || normalizedCoverageGateMode == 'both') {
        dependsOn tasks.named('jacocoIntegrationCoverageVerificationOverall')
        dependsOn tasks.named('jacocoIntegrationCoverageVerificationKeyPackages')
    }
}

